<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <meta
        name="description"
        content="TalentSphere AI Powered Recruitment Platform"
    />

    <meta
        name="keywords"
        content="AI Recruitment, Candidate Ranking, TalentSphere"
    />

    <meta
        name="author"
        content="TalentSphere Team"
    />

    <title>
        TalentSphere | AI Candidate Matching
    </title>

    <link
        rel="icon"
        href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
    />

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {

            background-color: #f4f6f9;

        }

        #root {

            min-height: 100vh;

        }

        .loader {

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

        }

        .spinner {

            width: 50px;
            height: 50px;
            border: 5px solid #ddd;
            border-top: 5px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;

        }

        @keyframes spin {

            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }

        }

    </style>

</head>

<body>

    <noscript>
        You need to enable JavaScript to run TalentSphere.
    </noscript>

    <div id="root">

        <div class="loader">

            <div class="spinner"></div>

        </div>

    </div>

</body>

</html>
